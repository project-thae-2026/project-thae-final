<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Thae </title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">

        <h1>Welcome To Project Thae</h1>

        <p>A little surprise is waiting for you...</p>

    </div>

    <!-- Night Sky -->
    <div class="stars"></div>

    <div class="moon"></div>

    <!-- Main -->
    <main class="container">

        <h1 class="title">
            Happy Birthday
        </h1>

        <h2 class="name">
            သဲ
        </h2>

        <p class="message">

            I made this little website
            with all my love 

            <br><br>

            Tap the button below
            and enjoy your surprise.

        </p>

        <button id="startBtn">
            Open Your Surprise 
        </button>

    </main>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
