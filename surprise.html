<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise </title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="surprise-container">

    <h1 class="surprise-title">
        Happy Birthday
    </h1>

    <h2 class="surprise-name">
        Thae
    </h2>

    <p class="surprise-message">
    ဒီနေ့က သဲရဲ့ အထူးခြားဆုံးနေ့လေးပါ။ 
    <br>
    ဒီ Surprise လေးကို
    သဲအတွက် အချစ်တွေအပြည့်နဲ့
    ပြင်ဆင်ထားတာပါ။
    <br>
    မွေးနေ့မှာ အမြဲပျော်ရွှင်ပြီး
    အပြုံးလေးတွေ မပျောက်ပါစေနော်။ 
</p>

    <!-- Premium Cake -->

    <div class="cake">

        <div class="cake-layer bottom-layer"></div>

        <div class="cake-layer middle-layer"></div>

        <div class="cake-layer top-layer"></div>

        <div class="cake-cream">
    <span class="drip drip1"></span>
    <span class="drip drip2"></span>
    <span class="drip drip3"></span>
    <span class="drip drip4"></span>
    <span class="drip drip5"></span>
</div>

        <div class="candle">

            <div id="flame" class="flame"></div>

        </div>

    </div>

    <button id="lightBtn">
         Light the Candle
    </button>

    <button id="nextBtn" onclick="location.href='flower.html'">
    Continue
</button>

</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
