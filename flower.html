<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Flowers For Thae</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
    to bottom,
    #fff0f6 0%,
    #fff0f6 65%,
    #b8e994 100%
);
font-family:Arial;
}

.box{
text-align:center;
position:relative;
z-index:1;}
h1{
    color:#ff4f8c;
    margin-bottom:30px;
    font-size:32px;
    font-family:"Noto Serif Myanmar",serif;
    text-shadow:
    0 2px 6px rgba(255,79,140,0.3);
    letter-spacing:2px;
}

.bouquet{
position:relative;
width:220px;
height:250px;
margin:auto;
animation:float 3s ease-in-out infinite;
}

.flower{
position:absolute;
width:70px;
height:70px;
}

.petal{
position:absolute;
width:38px;
height:38px;
background:linear-gradient(
    135deg,
    #ffb6d5,
    #ff6fa8
);
border-radius:50%;
box-shadow:0 3px 6px rgba(0,0,0,0.15);
}

.top{
top:0;
left:16px;
}

.left{
top:16px;
left:0;
}

.right{
top:16px;
right:0;
}

.bottom{
bottom:0;
left:16px;
}

.center{
position:absolute;
width:22px;
height:22px;
background:linear-gradient(
    135deg,
    #fff08a,
    #ffc107
);
border-radius:50%;
top:24px;
left:24px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.f1{
left:20px;
top:40px;
}

.f2{
left:75px;
top:10px;
}

.f3{
left:130px;
top:40px;
}
.stem{
    position:absolute;
    width:5px;
    height:130px;
    background:#3c9b4a;
    bottom:30px;
    border-radius:5px;
}
.s1{
    left:75px;
    transform:rotate(-12deg);
}

.s2{
    left:110px;
    height:145px;
}

.s3{
    left:145px;
    transform:rotate(12deg);
}

.leaf{
    position:absolute;
    width:35px;
    height:18px;
    background:#4caf50;
    border-radius:100% 0;
}

.l1{
    left:30px;
    bottom:70px;
    transform:rotate(-35deg);
}

.l2{
    left:135px;
    bottom:80px;
    transform:rotate(35deg);
}
.l3{
    left:95px;
    bottom:55px;
    transform:rotate(-47deg);
}
.wrapper{
    position:absolute;
    width:120px;
    height:80px;
    background:linear-gradient(
    135deg,
    #ffe0ea,
    #ffb6c9
);
    bottom:45px;
    left:50px;
    clip-path:polygon(0 0,100% 0,80% 100%,20% 100%);
    z-index:3;
}

.ribbon{
    position:absolute;
    bottom:75px;
    left:85px;
    width:50px;
    height:35px;
    z-index:5;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,0.2));
}

.knot{
    position:absolute;
    width:25px;
    height:25px;
    background:linear-gradient(
    135deg,
    #ff4b4b,
    #b80000
);
    border-radius:50%;
    left:11px;
    top:2px;
    z-index:5;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);
    
}
.knot::before,
.knot::after{
    content:"";
    position:absolute;
    width:38px;
    height:22px;
    background:linear-gradient(
    135deg,
    #ff4b4b,
    #b80000
);
    top:6px;
    clip-path:polygon(
        0 50%,
        100% 0,
        100% 100%
    );
}
.knot::before{
    left:-12px;
    transform:scaleX(-1);
}

.knot::after{
    right:-12px;
    transform:none;
}

.tail{
    position:absolute;
    width:55px;
    height:18px;
    background:#ff5fa2;
    top:10px;
}
.tail.left,
.tail.right{
    background:linear-gradient(
        135deg,
        #ff4b4b,
        #b80000
    );
}

.tail.left{
    left:-35px;
    transform:rotate(25deg);
    clip-path:polygon(0 20%,100% 0,85% 100%,20% 80%);
}

.tail.right{
    right:-35px;
    transform:rotate(-25deg);
    clip-path:polygon(0 0,100% 20%,80% 80%,15% 100%);
}
}
.grass{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:35px;
    background:
    linear-gradient(
        120deg,
        transparent 40%,
        #7ac943 41%,
        transparent 45%
    ),
    linear-gradient(
        60deg,
        transparent 40%,
        #6bbf3a 41%,
        transparent 45%
    );
    opacity:0.6;
    z-index:0;
pointer-events:none;
}
.small-flower{
    position:absolute;
    width:18px;
    height:18px;
    background:#ff8fba;
    border-radius:50%;
    box-shadow:
0 2px 5px rgba(0,0,0,0.15),
10px 0 #ff8fba,
-10px 0 #ff8fba,
0 10px #ff8fba,
0 -10px #ff8fba;
    z-index:0;
}
.small-flower::after{
    content:"";
    position:absolute;
    width:7px;
    height:7px;
    background:#ffd54f;
    border-radius:50%;
    top:5px;
    left:5px;
}

.flower-dot1{
    left:40px;
    bottom:35px;
}

.flower-dot2{
    right:50px;
    bottom:45px;
}
.grass-blade{
    position:absolute;
    width:3px;
    height:18px;
    background:#5aa832;
    bottom:0;
    border-radius:5px;
    transform:rotate(-20deg);
    opacity:0.7;
}

.g1{
    left:20px;
}

.g2{
    left:70px;
    height:25px;
    transform:rotate(15deg);
}

.g3{
    right:80px;
    height:22px;
    transform:rotate(-15deg);
}

.g4{
    right:25px;
    height:16px;
    transform:rotate(20deg);
}
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:#fff;
    border-radius:50%;
    box-shadow:
    0 0 8px #fff,
    0 0 15px #ffd6e7;
    animation:shine 2s infinite alternate;
}

@keyframes shine{
    from{
        opacity:0.3;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1.3);
    }
}

.sp1{
    top:80px;
    left:40px;
}

.sp2{
    top:150px;
    right:50px;
}

.sp3{
    bottom:120px;
    left:80px;
}
@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-6px);
    }
}
.next-btn{
    display:block;
    width:max-content;
    margin:30px auto 0;
    padding:15px 40px;
    background:#ff5f9e;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-size:18px;
    box-shadow:0 5px 12px rgba(255,95,158,0.3);
    transition:0.3s;
}

.next-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>
  <div class="grass"></div>
  <div class="sparkle sp1"></div>
<div class="sparkle sp2"></div>
<div class="sparkle sp3"></div>
  <div class="grass-blade g1"></div>
<div class="grass-blade g2"></div>
<div class="grass-blade g3"></div>
<div class="grass-blade g4"></div>
  <div class="small-flower flower-dot1"></div>
<div class="small-flower flower-dot2"></div>

<div class="box">

<h1>သဲအတွက် ပန်းစည်းလေး Love You Thae Lay</h1>

<div class="bouquet">
  <div class="stem s1"></div>
<div class="stem s2"></div>
<div class="stem s3"></div>
<div class="wrapper"></div>
<div class="ribbon">
    <div class="knot"></div>
    <div class="tail left"></div>
    <div class="tail right"></div>
</div>

<div class="leaf l1"></div>
<div class="leaf l2"></div>
<div class="leaf l3"></div>

<div class="flower f1">
<div class="petal top"></div>
<div class="petal left"></div>
<div class="petal right"></div>
<div class="petal bottom"></div>
<div class="center"></div>
</div>

<div class="flower f2">
<div class="petal top"></div>
<div class="petal left"></div>
<div class="petal right"></div>
<div class="petal bottom"></div>
<div class="center"></div>
</div>

<div class="flower f3">
<div class="petal top"></div>
<div class="petal left"></div>
<div class="petal right"></div>
<div class="petal bottom"></div>
<div class="center"></div>
</div>



</div>
<a href="gallery.html" class="next-btn">
    အမှတ်တရပုံများကြည့်မယ်
</a>
</body>
</html>
