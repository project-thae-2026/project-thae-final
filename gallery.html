<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thae Memories</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<audio id="bgMusic" src="music.mp3"></audio>
<div class="gallery-page">
    <div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
    <div class="sun"></div>
    
    

    <h1>
        သဲအတွက် အမှတ်တရလေးများ
    </h1>

    <div class="photo-box">

        <img 
        id="galleryPhoto" 
        src="photo1.jpg" 
        alt="Thae Memory">

    </div>


    <p id="galleryText">
        သဲနဲ့အတူရှိခဲ့တဲ့ အမှတ်တရလေးတွေပါ 
    </p>
    <button id="musicBtn">
   🎵 Music အရင်ဖွင့်နော် သဲ💝
</button>


    <div class="gallery-buttons">

<button id="prevBtn" class="lockBtn">
    ရှေ့ပုံပြန်ကြည့်မယ်
</button>

<button id="galleryNextBtn" class="lockBtn">
    နောက်တစ်ပုံကြည့်မယ်
</button>
</div>
<button id="continueBtn" class="lockBtn">
    ထပ်ရှိသေးတယ်သဲ
</button>

</div>


<script src="script.js"></script>

</body>
</html>
